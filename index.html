<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Guiones AIDA — Venus Impact</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--border-hover:#d97706;--accent:#f59e0b;--accent-dark:#d97706;--accent-dim:rgba(245,158,11,0.08);--text:#e8e8f0;--text-muted:#6b6b8a;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:16px;}
  header{margin-bottom:28px;}
  .logo{height:42px;display:block;margin-bottom:8px;}
  .header-sub{font-size:12px;color:var(--text-muted);}
  .section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;margin-top:20px;}
  .field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:4px;}
  .field:focus{border-color:var(--border-hover);}
  .field::placeholder{color:var(--text-muted);}
  textarea.field{resize:vertical;min-height:90px;}
  .formats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
  .fmt-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .fmt-btn.active{border-color:var(--accent-dark);background:var(--accent-dim);color:var(--accent);}
  .generate-btn{width:100%;padding:18px;border-radius:12px;border:none;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;margin-top:20px;margin-bottom:24px;}
  .generate-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .generate-btn:not(:disabled):hover{opacity:0.9;}
  .loading{text-align:center;padding:48px;color:var(--text-muted);display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .results{display:none;}
  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
  .results-title{font-size:20px;font-weight:600;}
  .new-btn{font-size:11px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .script-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .script-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .script-type{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:4px 10px;border-radius:20px;border:1px solid var(--accent-dark);}
  .script-duration{font-size:11px;color:var(--text-muted);}
  .aida-block{margin-bottom:14px;}
  .aida-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent-dark);margin-bottom:6px;font-weight:700;}
  .aida-text{font-size:13px;color:var(--text);line-height:1.7;background:rgba(245,158,11,0.04);border-left:2px solid var(--accent-dark);padding:10px 14px;border-radius:0 8px 8px 0;}
  .hooks-section{margin-bottom:14px;}
  .hook-item{font-size:12px;color:var(--text-muted);padding:8px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:6px;line-height:1.5;}
  .hook-item::before{content:"🎣 ";color:var(--accent);}
  .cta-block{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:14px;}
  .cta-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-weight:700;}
  .cta-text{font-size:14px;color:var(--text);font-weight:600;line-height:1.5;}
  .copy-btn{width:100%;margin-top:14px;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .copy-btn:hover{border-color:var(--accent-dark);color:var(--accent);}
  .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:16px;color:#f87171;font-size:13px;text-align:center;margin-bottom:16px;}
  @media(max-width:480px){.formats{gap:6px}}
</style>
</head>

<div id="formPanel">
  <div class="section-label">Sector / Negocio</div>
  <input type="text" class="field" id="sector" placeholder="Ej: Energía solar, Clínica dental, Academia de inglés...">

  <div class="section-label">Producto o servicio</div>
  <input type="text" class="field" id="producto" placeholder="Ej: Instalación de placas solares para hogares">

  <div class="section-label">Beneficio principal / Propuesta de valor</div>
  <input type="text" class="field" id="beneficio" placeholder="Ej: Ahorra hasta un 80% en tu factura de luz desde el primer mes">

  <div class="section-label">Público objetivo</div>
  <input type="text" class="field" id="publico" placeholder="Ej: Propietarios de vivienda de 35-60 años en España">

  <div class="section-label">Formato del ad</div>
  <div class="formats">
    <button class="fmt-btn active" data-fmt="Vídeo corto (15-30s)">⚡ Vídeo corto 15-30s</button>
    <button class="fmt-btn active" data-fmt="Vídeo medio (45-60s)">🎬 Vídeo medio 45-60s</button>
    <button class="fmt-btn" data-fmt="Vídeo largo (90s+)">📽️ Vídeo largo 90s+</button>
    <button class="fmt-btn" data-fmt="Carrusel">🖼️ Carrusel</button>
  </div>

  <div class="section-label">Objetivo de la campaña</div>
  <div class="formats" id="objetivos">
    <button class="fmt-btn active" data-obj="Generación de leads">📋 Leads</button>
    <button class="fmt-btn" data-obj="Ventas directas">💰 Ventas</button>
    <button class="fmt-btn" data-obj="Reconocimiento de marca">👁️ Branding</button>
    <button class="fmt-btn" data-obj="Tráfico a web">🌐 Tráfico web</button>
  </div>

  <button class="generate-btn" id="generateBtn" disabled>Rellena los campos para generar guiones</button>
</div>

<div class="loading" id="loadingPanel">
  <div class="spinner"></div>
  <div>Generando guiones AIDA...</div>
  <div style="font-size:11px;margin-top:8px;color:#555">Esto puede tardar unos segundos</div>
</div>

<div class="results" id="resultsPanel"></div>

<script>
let selectedFormats = ['Vídeo corto (15-30s)', 'Vídeo medio (45-60s)'];
let selectedObjetivo = 'Generación de leads';

document.querySelectorAll('.fmt-btn').forEach(btn => {
  if (btn.dataset.fmt) {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      selectedFormats = [...document.querySelectorAll('.fmt-btn.active[data-fmt]')].map(b => b.dataset.fmt);
      updateBtn();
    });
  }
  if (btn.dataset.obj) {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn[data-obj]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedObjetivo = btn.dataset.obj;
    });
  }
});

['sector','producto','beneficio','publico'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateBtn);
});

function updateBtn() {
  const btn = document.getElementById('generateBtn');
  const sector = document.getElementById('sector').value.trim();
  const producto = document.getElementById('producto').value.trim();
  const beneficio = document.getElementById('beneficio').value.trim();
  if (sector && producto && beneficio && selectedFormats.length > 0) {
    btn.disabled = false;
    btn.textContent = `Generar guiones AIDA para ${sector}`;
  } else {
    btn.disabled = true;
    btn.textContent = 'Rellena los campos para generar guiones';
  }
}

document.getElementById('generateBtn').addEventListener('click', generate);

async function generate() {
  const sector = document.getElementById('sector').value.trim();
  const producto = document.getElementById('producto').value.trim();
  const beneficio = document.getElementById('beneficio').value.trim();
  const publico = document.getElementById('publico').value.trim() || 'adultos en España';
  const formatos = selectedFormats.join(', ');

  document.getElementById('formPanel').style.display = 'none';
  document.getElementById('loadingPanel').style.display = 'block';

  const prompt = `Eres un experto en copywriting para Meta Ads con el método AIDA. Crea guiones para ads de Meta para este negocio:
- Sector: ${sector}
- Producto/servicio: ${producto}
- Beneficio principal: ${beneficio}
- Público objetivo: ${publico}
- Formatos: ${formatos}
- Objetivo: ${selectedObjetivo}

Responde SOLO con este JSON sin texto adicional:
{"guiones":[{"formato":"nombre del formato","duracion":"duración estimada","hooks":["hook1 impactante","hook2 con pregunta","hook3 con dato"],"atencion":"texto ATENCIÓN del guión (2-3 frases que enganchen)","interes":"texto INTERÉS del guión (2-3 frases con el problema/necesidad)","deseo":"texto DESEO del guión (2-3 frases con el beneficio y prueba social)","accion":"texto ACCIÓN del guión (1-2 frases)","cta":"CTA específico y directo"}]}`;

  try {
    const resp = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: [{role: 'user', content: prompt}] })
    });

    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    const text = data.content[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    showResults(parsed, sector, producto);
  } catch(err) {
    document.getElementById('loadingPanel').style.display = 'none';
    document.getElementById('formPanel').style.display = 'block';
    const errDiv = document.createElement('div');
    errDiv.className = 'error-box';
    errDiv.textContent = '⚠ Error al generar. Inténtalo de nuevo.';
    document.getElementById('formPanel').prepend(errDiv);
    setTimeout(() => errDiv.remove(), 5000);
  }
}

function showResults(data, sector, producto) {
  document.getElementById('loadingPanel').style.display = 'none';
  const panel = document.getElementById('resultsPanel');
  panel.style.display = 'block';

  let html = `<div class="results-header">
    <div class="results-title">Guiones para ${sector}</div>
    <button class="new-btn" onclick="newSearch()">↩ Nuevo guión</button>
  </div>`;

  data.guiones.forEach((g, i) => {
    const fullText = `${g.hooks[0]}\n\n${g.atencion}\n\n${g.interes}\n\n${g.deseo}\n\n${g.accion}\n\n${g.cta}`;
    html += `<div class="script-card">
      <div class="script-header">
        <span class="script-type">${g.formato}</span>
        <span class="script-duration">⏱ ${g.duracion}</span>
      </div>
      <div class="hooks-section">
        <div class="aida-label">🎣 Hooks de apertura</div>
        ${g.hooks.map(h => `<div class="hook-item">${h}</div>`).join('')}
      </div>
      <div class="aida-block">
        <div class="aida-label">A — Atención</div>
        <div class="aida-text">${g.atencion}</div>
      </div>
      <div class="aida-block">
        <div class="aida-label">I — Interés</div>
        <div class="aida-text">${g.interes}</div>
      </div>
      <div class="aida-block">
        <div class="aida-label">D — Deseo</div>
        <div class="aida-text">${g.deseo}</div>
      </div>
      <div class="aida-block">
        <div class="aida-label">A — Acción</div>
        <div class="aida-text">${g.accion}</div>
      </div>
      <div class="cta-block">
        <div class="cta-label">💥 CTA</div>
        <div class="cta-text">${g.cta}</div>
      </div>
      <button class="copy-btn" onclick="copyScript(${i})">📋 Copiar guión completo</button>
    </div>`;
  });

  panel.innerHTML = html;
  window._scripts = data.guiones;
}

function copyScript(i) {
  const g = window._scripts[i];
  const text = `🎣 HOOK:\n${g.hooks[0]}\n\n📢 ATENCIÓN:\n${g.atencion}\n\n💡 INTERÉS:\n${g.interes}\n\n❤️ DESEO:\n${g.deseo}\n\n👉 ACCIÓN:\n${g.accion}\n\n💥 CTA:\n${g.cta}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelectorAll('.copy-btn')[i];
    btn.textContent = '✅ Copiado';
    setTimeout(() => btn.textContent = '📋 Copiar guión completo', 2000);
  });
}

function newSearch() {
  document.getElementById('resultsPanel').style.display = 'none';
  document.getElementById('formPanel').style.display = 'block';
}
</script>
</body>
</html>
